name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show uv version
        run: uv --version
          
      - name: Install dependencies
        run: |
          uv sync --group dev
          
      - name: Install package
        run: |
          uv pip install -e .
          
      - name: Lint with Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
          
      - name: Test with Pytest
        run: |
          uv run pytest
